<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>كتاب الطبيعيات التفاعلي — أساس المشروع</title>
  <meta name="description" content="البنية التحتية لكتاب فيزياء تفاعلي: نظام تصميم، دعم عربي/RTL كامل، MathJax، وإطار محاكاات." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/src/styles/tokens.css" />
  <link rel="stylesheet" href="/src/styles/base.css" />
  <link rel="stylesheet" href="/src/styles/layout.css" />
  <link rel="stylesheet" href="/src/styles/rtl.css" />
</head>
<body>
  <a class="skip-link" href="#main-content" data-i18n="a11y.skipToContent">تخطي إلى المحتوى</a>

  <div class="app-shell" id="top">
    <app-header>
      <app-nav></app-nav>
    </app-header>

    <main id="main-content">
      <section class="container hero lab-texture section">
        <div class="stack">
          <span class="cluster" style="display:inline-flex; width:fit-content; padding:4px 12px; border-radius:999px; background:var(--color-primary-soft); color:var(--color-primary); font-weight:700; font-size:var(--fs-200);" data-i18n="hero.badge"></span>
          <h1 data-i18n="hero.title"></h1>
          <p style="color:var(--color-text-muted); font-size:var(--fs-400); max-width:60ch;" data-i18n="hero.body"></p>
        </div>
        <sim-container class="sim-frame" id="hero-sim">
          <span data-i18n="sim.demo.title" style="font-weight:700; position:absolute; inset-inline-start:12px; top:12px;"></span>
        </sim-container>
      </section>

      <section class="container section" id="components">
        <h2 data-i18n="showcase.title"></h2>
        <div class="grid grid--3-up">
          <ui-card icon="🧩">
            <span slot="heading"><h3 data-i18n="showcase.card1.title"></h3></span>
            <p data-i18n="showcase.card1.body"></p>
          </ui-card>
          <ui-card icon="🗂️">
            <span slot="heading"><h3 data-i18n="showcase.card2.title"></h3></span>
            <p data-i18n="showcase.card2.body"></p>
          </ui-card>
          <ui-card icon="🖥️">
            <span slot="heading"><h3 data-i18n="showcase.card3.title"></h3></span>
            <p data-i18n="showcase.card3.body"></p>
          </ui-card>
        </div>
      </section>

      <section class="container section section--sunken">
        <div style="padding: var(--space-6);" class="stack">
          <ui-tabs>
            <ui-tab label="Callouts">
              <div class="stack">
                <lab-callout variant="note"><p data-i18n="showcase.card1.body"></p></lab-callout>
                <lab-callout variant="warning"><p data-i18n="showcase.card2.body"></p></lab-callout>
                <lab-callout variant="experiment"><p data-i18n="showcase.card3.body"></p></lab-callout>
              </div>
            </ui-tab>
            <ui-tab label="MathJax">
              <p data-i18n="math.sample.label" style="color:var(--color-text-muted); margin-block-end: var(--space-3);"></p>
              <math-block>
                \[ F = m a \qquad E = m c^2 \qquad \int_0^t v\,dt = x \]
              </math-block>
            </ui-tab>
          </ui-tabs>
        </div>
      </section>

      <section class="container section" id="about">
        <lab-callout variant="note" label="Foundation">
          <p data-i18n="sim.demo.body"></p>
        </lab-callout>
      </section>
    </main>

    <app-footer></app-footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
