<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>كتاب الطبيعيات التفاعلي — الرئيسية</title>
  <meta name="description" content="كتاب طبيعيات تفاعلي: دروس تفاعلية، أمثلة محلولة بالكامل، ومحاكاات فيزيائية حيّة." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="src/styles/tokens.css" />
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/layout.css" />
  <link rel="stylesheet" href="src/styles/rtl.css" />
  <style>
    /* A single calm, centered focal point — no competing panels, no
       decorative motion (Priority 1 of the calm-UI rebuild). */
    .hero-section {
      padding-block: var(--space-9) var(--space-8);
      display: flex;
      justify-content: center;
      text-align: center;
    }
    .hero-stack {
      align-items: center;
      margin-inline: auto;
      gap: var(--space-5);
    }
    .hero-lede {
      color: var(--color-text-muted);
      font-size: var(--fs-400);
      margin: 0;
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content" data-i18n="a11y.skipToContent">تخطي إلى المحتوى</a>

  <div class="app-shell" id="top">
    <app-header></app-header>
    <app-sidebar></app-sidebar>

    <div class="content-column">
      <main id="main-content">
        <section class="container hero-section">
          <div class="stack hero-stack content-max">
            <h1 data-i18n="hero.title"></h1>
            <p class="hero-lede" data-i18n="hero.body"></p>
            <a class="btn btn--primary btn--lg" href="#chapters" data-i18n="hero.cta.primary"></a>
          </div>
        </section>

        <section class="container section" id="chapters">
          <div class="stack" style="margin-block-end: var(--space-6); max-width: 65ch;">
            <h2 data-i18n="chapters.sectionTitle"></h2>
            <p style="color:var(--color-text-muted);" data-i18n="chapters.sectionSubtitle"></p>
          </div>
          <div class="grid grid--2-up" id="chapters-grid"></div>
        </section>
      </main>

      <app-footer></app-footer>
    </div>
  </div>

  <app-search></app-search>
  <settings-panel></settings-panel>

  <script type="module" src="src/main.js"></script>
</body>
</html>
